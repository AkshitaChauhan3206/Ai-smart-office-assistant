<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Smart Office Admin{% endblock %}</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        // Init theme safely
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="d-flex align-items-center mb-5 px-3">
            <i class="fas fa-layer-group text-primary fs-3 me-2"></i>
            <h5 class="mb-0 fw-bold text-main">AI Office</h5>
        </div>

        <nav class="flex-grow-1">
            <a href="/" class="nav-link-custom {% if request.path == '/' %}active{% endif %}">
                <i class="fas fa-chart-pie"></i> Dashboard
            </a>
            <a href="/email-generator" class="nav-link-custom {% if request.path == '/email-generator' %}active{% endif %}">
                <i class="fas fa-envelope-open-text"></i> Smart Email
            </a>
            <a href="/spam-classifier" class="nav-link-custom {% if request.path == '/spam-classifier' %}active{% endif %}">
                <i class="fas fa-shield-alt"></i> Spam Classifier
            </a>
            <a href="/task-manager" class="nav-link-custom {% if request.path == '/task-manager' %}active{% endif %}">
                <i class="fas fa-check-double"></i> Task Manager
            </a>
        </nav>

        <div class="mt-auto px-3">
            <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center" onclick="toggleTheme()">
                <i class="fas fa-moon me-2" id="themeIcon"></i>
                <span id="themeText">Toggle Theme</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top header area can go here if needed -->
        {% block content %}{% endblock %}
    </main>
</div>

<!-- Bootstrap Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Theme Logic -->
<script>
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcon(newTheme);
    }
    function updateThemeIcon(theme) {
        const icon = document.getElementById('themeIcon');
        if(theme === 'dark') {
            icon.className = 'fas fa-sun text-warning me-2';
        } else {
            icon.className = 'fas fa-moon me-2';
        }
    }
    updateThemeIcon(document.documentElement.getAttribute('data-theme'));
</script>

{% block scripts %}{% endblock %}

</body>
</html>
